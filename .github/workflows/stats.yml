name: github-stats

on:
    schedule:
        # 매일 새벽 0시에 자동으로 실행
        - cron: "0 0 * * *"
    workflow_dispatch:

jobs:
    update-stats:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: hyochan/github-stats@v2.4.0
              with:
                  token: ${{ secrets.GH_TOKEN }}
